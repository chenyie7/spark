# pipeline.yaml
# Coder-Reviewer 流水线 DAG 配置
# 调度 Agent 读取本文件获取节点和边的定义，按拓扑顺序执行。

name: coder-reviewer-pipeline
version: "1.0"
description: "标准 coder → reviewer 代码生成流水线，含 P0 修复循环"

# ── 全局默认值 ──
# 调度 Agent 在启动每个节点时使用这些默认值，节点可覆盖。
defaults:
  timeout: 600s          # 单节点默认超时（秒）
  max_retries: 3         # reviewer → coder 最大循环轮次
  block_on: [P0]         # 触发回退的严重级别列表
  base_path: "."         # 项目存放位置，默认当前目录
  project_name: ""       # 项目名称，空则需要交互输入

# ── DAG 节点 ──
# 每个节点对应一个 Agent。调度 Agent 按 edges 定义的顺序逐个执行。
nodes:
  - id: coder
    type: agent
    agent: coder
    description: "根据需求生成 Spring Boot 3 Java 代码，遵守 agents/coder/ 下的所有规范"
    prompt_template: |
      开始工作前，先读取 review-output/.current-run 获取 output_dir 和 scan_path。

      你需要根据用户需求生成 Java 代码。

      用户需求：
      {requirement}

      禁止一次性读取所有agents/coder下的所有规范，先读取 agents/coder/README.md 获取完整索引，
      按照开发需求按需加载所需要的规范文件

      {review_context}

      边界约束：
      1. 你只能修改 {output_dir}/src/main/java/ 目录下的 Java 文件和 {output_dir}/pom.xml（如需添加依赖）。
      2. 禁止修改 agents/ 或 hooks/ 目录下的任何文件。这些是审查系统的规则和配置，修改它们会导致流水线结果不可信。
      3. 严格遵守 `agents/coder/coder.skill.md` 中「读取范围」定义的允许和禁止读取列表。

      代码输出目录：从 review-output/.current-run 读取 scan_path
      将生成的 Java 代码写入 {output_dir}/src/main/java 对应包路径下。
    inputs:
      - requirement: "${user_input}"
      - review_context: "review-output/{run_id}/ 目录下的审查结果（仅修复轮次时存在）"
    outputs:
      - output_dir: "{output_dir}/src/main/java"
    timeout: 900s
    depends_on: []          # 起始节点，无依赖

  - id: reviewer
    type: agent
    agent: reviewer
    description: "对 coder 产出的代码执行双层审查：Layer 1 Python CLI 预检 + Layer 2 AI 语义检查"
    prompt_template: |
      开始工作前，先读取 review-output/.current-run 获取 output_dir 和 scan_path。
      严格遵守 `agents/reviewer/review.skill.md` 中「读取范围」定义的允许和禁止读取列表。

      你是 review agent。请严格按以下步骤执行，不可跳过任何步骤。

      1. 调用 MCP tool `fuck-u-code analyze` 扫描 {output_dir}/src/main/java
         产出 quality.json，保存到 review-output/{run_id}/quality.json
         （如 MCP 调用失败，记录警告后继续第 2 步）

      2. 读取 agents/reviewer/check_system/rules/ai-checklist.yaml（涵盖结构、质量、认证、基础设施等多维度审查清单）
         读取 review-output/{run_id}/quality.json（如存在）
         对 {output_dir}/src/main/java 下所有 Java 文件执行统一审查：
         - 逐条对照 ai-checklist 检查规范合规 → spec_violations[]
         - 对 quality.json 标红的高分文件做深度分析 → quality_issues[]

      3. 按固定 JSON schema 输出 findings.json，写入 review-output/{run_id}/findings.json
         判定 review_status: P0>0 → FAILED, 否则 PASSED

      4. 调用 python3 -m code_check.cli report 合并 quality.json + findings.json → final-review-report.md

      返回: REVIEW_PASSED / REVIEW_FAILED / REVIEW_ERROR
    inputs:
      - coder_output: "${coder.outputs.output_dir}"
    outputs:
      - pre_check: "review-output/{run_id}/pre-check-result.json"
      - ai_review: "review-output/{run_id}/review-result.json"
      - final_report: "review-output/{run_id}/final-review-report.md"
    timeout: 600s
    depends_on: [coder]     # 依赖 coder 产出

# ── DAG 边 ──
# 调度 Agent 按以下规则决定流转：
#   1. coder 成功后 → reviewer
#   2. reviewer Agent 返回 REVIEW_PASSED → DONE
#   3. reviewer Agent 返回 REVIEW_FAILED 且未达 max_retries → 回到 coder（修复模式）
#   4. reviewer Agent 返回 REVIEW_FAILED 且达到 max_retries → DONE
#   5. reviewer Agent 返回 REVIEW_ERROR → DONE（异常终止）
edges:
  - from: coder
    to: reviewer
    trigger: on_success
    description: "coder 生成代码后，进入 reviewer 审查"

  - from: reviewer
    to: coder
    trigger: on_condition
    condition:
      status: REVIEW_FAILED
    description: "review Agent 返回 REVIEW_FAILED 且 round < max_retries，回到 coder 修复"

  - from: reviewer
    to: DONE
    trigger: on_condition
    condition:
      status: REVIEW_PASSED
    description: "review Agent 返回 REVIEW_PASSED，P0 清零，流水线成功结束"

  - from: reviewer
    to: DONE
    trigger: on_condition
    condition:
      status: REVIEW_FAILED
    description: "review Agent 返回 REVIEW_FAILED 但达到 max_retries，停止循环"

  - from: reviewer
    to: DONE
    trigger: on_condition
    condition:
      status: REVIEW_ERROR
    description: "review Agent 返回 REVIEW_ERROR，环境或工具异常，停止流水线"
