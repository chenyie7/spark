# code-check 配置文件 —— 放在项目根目录

# 检查规则目录
rules_dir: rules/

# 阻断策略：strict | normal | loose
strategy: strict

# 输出目录
output_dir: ../../../review-output/20260624085601-001/

# 输出格式（scan 命令默认输出）：json | md
format: json

# 默认扫描路径（相对项目根目录）
default_scan_path: ../../../src/main/java

# 扫描排除目录
exclude:
  - "**/test/**"
  - "**/target/**"
  - "**/node_modules/**"
