# AI 语义检查清单 —— 程序判断不了的"对不对"问题
# 程序预检（program-checks.yaml）已覆盖所有确定性检查，AI 只做语义理解

# ═══════════════════════════════════════════════════════════════
# 分层架构
# ═══════════════════════════════════════════════════════════════

BE-ST-04:
  description: "Controller 是否直接注入 Mapper"
  level: P0
  ai:
    prompt_hint: "检查 Controller 类中是否直接注入了 Mapper 接口。Controller 应通过 Service 调用，直接注入 Mapper 违反了分层架构"

BE-ST-05:
  description: "Service 是否只有实现类没有接口"
  level: P1
  ai:
    prompt_hint: "检查 service/impl/ 下的 ServiceImpl 是否有对应的 Service 接口。Spring AOP 代理（事务、缓存）依赖接口，缺少接口会导致代理失效"

BE-ST-07:
  description: "Service 方法是否返回 Entity 给 Controller"
  level: P1
  ai:
    prompt_hint: "检查 Service 方法的返回值类型是否为 Entity。Entity 是数据库映射对象，不应暴露到 Controller 层，应转换为 VO 后返回"

BE-ST-18:
  description: "Entity 类命名是否符合规范"
  level: P2
  ai:
    prompt_hint: "检查 entity/ 目录下的实体类命名。项目规范支持两种风格：*Entity.java（如 UserEntity.java）或 Sys* 前缀（如 SysUser.java）。只要符合其中一种即可，不强制要求 Entity 后缀。检查前先读取项目的实际实体类命名模式，确认团队采用的风格。"

# ═══════════════════════════════════════════════════════════════
# 异常处理
# ═══════════════════════════════════════════════════════════════

BE-QL-01:
  description: "是否写了 throw new RuntimeException(\"自由文本\")"
  level: P1
  ai:
    prompt_hint: "检查代码中是否直接抛出 new RuntimeException() 或 new Exception() 并传入自由文本。应使用 BusinessException(BusinessErrorEnum.XXX) 替代，确保异常有统一错误码和国际化支持"

BE-QL-02:
  description: "业务异常是否使用 BusinessException(BusinessErrorEnum.XXX)"
  level: P1
  ai:
    prompt_hint: "检查抛出的业务异常是否使用了 BusinessException 并传入了 BusinessErrorEnum 枚举值，而非直接 new BusinessException(\"文本\")。使用枚举确保错误码统一管理"

BE-QL-04:
  description: "Controller 方法是否包裹了 try-catch"
  level: P1
  ai:
    prompt_hint: "检查 Controller 方法中是否手写了 try-catch 块。应由 GlobalExceptionHandler 统一拦截异常并返回 Result<T> 格式。手写 try-catch 会导致异常处理逻辑分散、返回格式不统一"

BE-QL-05:
  description: "Service 中 catch 异常后是否只打日志不抛出"
  level: P1
  ai:
    prompt_hint: "检查 Service 层的 catch 块，确认 catch 后是否只记录了日志但没有向上抛出异常。异常被吞掉会导致上层调用者和事务管理器无法感知错误，可能造成数据不一致"

BE-QL-06:
  description: "系统异常是否被 GlobalExceptionHandler 兜底处理"
  level: P2
  ai:
    prompt_hint: "检查 GlobalExceptionHandler 中是否有 @ExceptionHandler(Exception.class) 兜底方法，确保 NPE、IOException 等非业务异常也能返回统一格式的 Result<T> 错误响应，而非暴露堆栈信息"

# ═══════════════════════════════════════════════════════════════
# 日志质量
# ═══════════════════════════════════════════════════════════════

BE-QL-11:
  description: "log.info 是否包含关键业务信息（如 orderId、userId）"
  level: P2
  ai:
    prompt_hint: "检查 log.info/log.warn 语句是否包含了操作的关键业务标识。log.info(\"创建成功\") 不通过——出问题时无法定位；log.info(\"用户创建成功, userId={}, orderId={}\", userId, orderId) 通过"

BE-QL-12:
  description: "循环内是否有大量 log.info"
  level: P2
  ai:
    prompt_hint: "检查 for/while 循环体内是否调用了 log.info。循环内逐条打印日志会严重影响性能，应移出循环或使用批量日志"

# ═══════════════════════════════════════════════════════════════
# 代码质量
# ═══════════════════════════════════════════════════════════════

BE-QL-14:
  description: "是否返回了裸的 String、boolean、Map 或 JSONObject"
  level: P1
  ai:
    prompt_hint: "检查 Controller 方法的返回值类型。直接返回 String、boolean、Map、JSONObject 等裸类型破坏了统一响应格式，应使用 Result<T> 包裹或定义专门的 VO 返回"

BE-QL-35:
  description: "集合返回值是否可能为 null"
  level: P1
  ai:
    prompt_hint: "检查返回 List、Set、Map 等集合类型的方法，确保所有路径上都返回了非 null 值。返回 null 会导致调用方 NPE，应返回空集合（如 new ArrayList<>() 或 Collections.emptyList()）"

BE-QL-39:
  description: "循环内是否用 + 拼接字符串"
  level: P2
  ai:
    prompt_hint: "检查 for/while 循环内是否存在使用 + 或 += 拼接字符串的代码。循环内每次 + 拼接都会创建新的 String 对象，应使用 StringBuilder"

BE-QL-41:
  description: "是否存在魔法数字"
  level: P2
  ai:
    prompt_hint: "检查代码中是否存在未命名的数字字面量（如 if (status == 1)、sleep(5000)、size > 100）。应使用枚举或常量替代，提高可读性。注意区分：循环初始值 int i = 0、数学常量等不在此列"

BE-QL-46:
  description: "循环内是否逐条查数据库"
  level: P1
  ai:
    prompt_hint: "检查 for/while 循环内是否调用了 Mapper 方法逐条查询或插入数据库。应使用批量方法（selectBatchIds、insertBatch）或一次性查询（IN 条件）替代。循环内逐条操作数据库是常见的性能瓶颈"

BE-QL-16:
  description: "分页查询是否返回 Result<PageResult<T>>"
  level: P2
  ai:
    prompt_hint: "检查 Controller 中执行分页查询的方法是否返回了 Result<PageResult<T>> 格式。通过方法中是否使用 MyBatis-Plus Page<T> 或 IPage<T> 来判断该方法是否为分页查询。注意区分：方法名叫 list() 但实际返回全量列表的不是分页查询，不需要 PageResult。"

BE-QL-17:
  description: "分页查询 DTO 是否继承 PageQueryDTO"
  level: P2
  ai:
    prompt_hint: "检查被 Controller 分页查询方法（page 方法）用作参数的 DTO 类是否继承了 PageQueryDTO。CreateDTO、UpdateDTO、AssignDTO 等非分页请求 DTO 不在此检查范围。只检查真正用于分页查询参数的 DTO。"

BE-QL-38:
  description: "常量类是否 final + 私有构造"
  level: P2
  ai:
    prompt_hint: "检查名称为 *Constant、*Constants、*Code、*Codes 的真正常量类（只包含静态常量定义，无实例字段和业务方法）是否声明为 final 并包含私有构造方法。注意：PageQueryDTO、*QueryDTO 等分页查询 DTO 不是常量类，不应被此项检查。"

# ═══════════════════════════════════════════════════════════════
# 数据库规范
# ═══════════════════════════════════════════════════════════════

BE-QL-19:
  description: "业务表是否包含必备审计字段"
  level: P1
  ai:
    prompt_hint: "检查建表 SQL 和 Entity 类，确认业务表是否包含 id、create_id、create_name、create_time、update_id、update_name、update_time、deleted 等必备审计字段。日志表、多对多中间表、统计表可以不包含。缺少审计字段会导致无法追溯数据变更"

BE-QL-20:
  description: "主键是否使用 BIGINT + 雪花ID"
  level: P1
  ai:
    prompt_hint: "检查 Entity 类和建表 SQL，主键 id 应为 BIGINT（Java Long），并使用雪花ID 策略（@TableId(type = IdType.ASSIGN_ID)），不使用自增主键。自增主键在分布式环境下会产生冲突"

# ═══════════════════════════════════════════════════════════════
# 认证安全
# ═══════════════════════════════════════════════════════════════

BE-AU-07:
  description: "登录密码是否使用 BCryptPasswordEncoder 加密"
  level: P0
  ai:
    prompt_hint: "检查涉及用户密码操作的 Service 类中，密码是否通过 BCryptPasswordEncoder.encode() 加密后再存储。重点关注 AuthService 的登录/注册逻辑和 UserService 的创建用户/修改密码方法。不处理密码的 Service（如 DictService、MenuService、LogService）不需要此项检查，不应标记。"

BE-AU-02:
  description: "多端场景下是否直接使用 StpUtil 而未通过 StpKit 门面"
  level: P1
  ai:
    prompt_hint: "先读取 agents/coder/auth/auth-basic.md 确认项目的 Sa-Token 使用策略。如果是纯后台管理项目（无用户端、无多系统），规范明确允许直接使用 StpUtil；如果是多端项目（如同时有 admin 端和 app 端），应使用 StpKit 门面隔离不同端的会话。根据项目实际配置和规范文档判断是否违规，不要一刀切。"
